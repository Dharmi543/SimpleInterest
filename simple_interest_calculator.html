<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<style>
:root {
  --primary: #2563eb;
  --primary-hover: #1d4ed8;
  --bg-app: #f1f5f9;
  --bg-surface: #ffffff;
  --bg-inner: #f8fafc;
  --border-color: #e2e8f0;
  --border-focus: #3b82f6;
  --text-main: #1e293b;
  --text-sub: #64748b;
  --text-muted: #94a3b8;
  --accent: #2563eb;
  --success: #16a34a;
  --accent-light: #eff6ff;
}

* {
  box-sizing: border-box;
  margin: 0;
  padding: 0;
  -webkit-tap-highlight-color: transparent;
}

body {
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
  background-color: var(--bg-app);
  color: var(--text-main);
  display: flex;
  justify-content: center;
  align-items: center;
  min-height: 100vh;
}

/* App Container Wrapper */
.app-container {
  width: 100%;
  max-width: 480px;
  height: 100vh;
  background: var(--bg-surface);
  display: flex;
  flex-direction: column;
  position: relative;
  box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.05);
}

@media (min-height: 700px) and (min-width: 481px) {
  .app-container {
    height: 85vh;
    border-radius: 24px;
    border: 1px solid var(--border-color);
    overflow: hidden;
  }
}

/* Sticky App Header */
.app-header {
  background: var(--bg-surface);
  padding: 18px 20px;
  border-bottom: 1px solid var(--border-color);
  text-align: center;
  flex-shrink: 0;
}

.app-header h1 {
  font-size: 18px;
  font-weight: 700;
  color: var(--text-main);
  letter-spacing: -0.3px;
}

/* Scrollable Form Content */
.app-content {
  flex: 1;
  overflow-y: auto;
  padding: 20px;
  padding-bottom: 40px;
}

.si-group-title {
  font-size: 12px;
  font-weight: 700;
  color: var(--text-muted);
  text-transform: uppercase;
  letter-spacing: 0.5px;
  margin-bottom: 10px;
  margin-top: 5px;
}

.si-card-inputs {
  background: var(--bg-inner);
  border: 1px solid var(--border-color);
  border-radius: 14px;
  padding: 16px;
  margin-bottom: 20px;
}

.si-field {
  display: flex;
  flex-direction: column;
  margin-bottom: 14px;
}

.si-field:last-child {
  margin-bottom: 0;
}

.si-field label {
  font-size: 13px;
  font-weight: 600;
  color: var(--text-sub);
  margin-bottom: 6px;
}

.si-input-wrapper {
  position: relative;
  display: flex;
  align-items: center;
}

.si-input-wrapper input {
  width: 100%;
  padding: 12px 14px;
  border: 1px solid var(--border-color);
  border-radius: 10px;
  font-size: 15px;
  color: var(--text-main);
  background: var(--bg-surface);
  outline: none;
  transition: border-color 0.2s, box-shadow 0.2s;
  -webkit-appearance: none;
}

.si-input-wrapper input:focus {
  border-color: var(--border-focus);
  box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.15);
}

.si-input-wrapper input[type="date"] {
  position: absolute;
  right: 12px;
  width: 28px;
  height: 28px;
  opacity: 0;
  cursor: pointer;
  padding: 0;
}

.si-calendar-btn {
  position: absolute;
  right: 14px;
  pointer-events: none;
  font-size: 16px;
}

.today-tag {
  font-size: 11px;
  color: var(--success);
  margin-top: 5px;
  font-weight: 500;
}

/* UI Output Components */
.duration-badge {
  display: inline-flex;
  font-size: 13px;
  font-weight: 600;
  color: var(--accent);
  background: var(--accent-light);
  padding: 6px 14px;
  border-radius: 20px;
  margin-bottom: 10px;
}

.formula-box {
  background: var(--bg-inner);
  border: 1px solid var(--border-color);
  border-radius: 10px;
  padding: 12px 14px;
  font-size: 12px;
  color: var(--text-sub);
  line-height: 1.4;
  margin-bottom: 20px;
}

.formula-box span {
  color: var(--accent);
  font-weight: 600;
}

.metric-list {
  display: flex;
  flex-direction: column;
  gap: 10px;
  margin-top: 10px;
}

.metric-row {
  display: flex;
  justify-content: space-between;
  align-items: center;
  background: var(--bg-inner);
  border: 1px solid var(--border-color);
  border-radius: 12px;
  padding: 14px 16px;
}

.metric-label {
  font-size: 14px;
  font-weight: 500;
  color: var(--text-sub);
}

.metric-value {
  font-size: 18px;
  font-weight: 700;
  color: var(--text-main);
}
.metric-value.accent { color: var(--accent); }
.metric-value.success { color: var(--success); }

.hint {
  font-size: 13px;
  color: var(--text-muted);
  text-align: center;
  margin-top: 10px;
  padding: 0 10px;
}

/* Fixed Footer Action Button */
.app-footer {
  padding: 16px 20px;
  border-top: 1px solid var(--border-color);
  background: var(--bg-surface);
  flex-shrink: 0;
}

.btn-calc {
  width: 100%;
  background: var(--primary);
  color: white;
  border: none;
  border-radius: 12px;
  padding: 14px;
  font-size: 16px;
  font-weight: 600;
  cursor: pointer;
  transition: background 0.2s;
  box-shadow: 0 4px 12px rgba(37, 99, 235, 0.2);
}

.btn-calc:active {
  background: var(--primary-hover);
  transform: scale(0.99);
}
</style>

<div class="app-container">
  <header class="app-header">
    <h1>Interest Calculator</h1>
  </header>

  <div class="app-content">
    <div class="si-group-title">Parameters</div>
    <div class="si-card-inputs">
      <div class="si-field">
        <label for="principal">Principal Amount (₹)</label>
        <div class="si-input-wrapper">
          <input type="number" id="principal" placeholder="e.g. 50000" min="0">
        </div>
      </div>
      <div class="si-field">
        <label for="rate">Rate of Interest (r, decimal)</label>
        <div class="si-input-wrapper">
          <input type="number" id="rate" placeholder="e.g. 0.08" min="0" step="0.001">
        </div>
      </div>
    </div>

    <div class="si-group-title">Timeline</div>
    <div class="si-card-inputs">
      <div class="si-field">
        <label for="startDateTxt">Start Date (DD-MM-YYYY)</label>
        <div class="si-input-wrapper">
          <input type="text" id="startDateTxt" placeholder="DD-MM-YYYY" maxlength="10">
          <input type="date" id="startDatePicker" tabindex="-1">
          <span class="si-calendar-btn">📅</span>
        </div>
      </div>
      <div class="si-field">
        <label for="endDateTxt">End Date (DD-MM-YYYY)</label>
        <div class="si-input-wrapper">
          <input type="text" id="endDateTxt" placeholder="DD-MM-YYYY" maxlength="10">
          <input type="date" id="endDatePicker" tabindex="-1">
          <span class="si-calendar-btn">📅</span>
        </div>
        <p class="today-tag" id="todayTag" style="display:none">● Set to Today</p>
      </div>
    </div>

    <div id="outputBlock" style="display:none">
      <div class="si-group-title">Breakdown</div>
      <span class="duration-badge" id="durationText"></span>
      <div class="formula-box" id="formulaBox"></div>

      <div class="si-group-title">Results</div>
      <div class="metric-list">
        <div class="metric-row">
          <span class="metric-label">Principal</span>
          <span class="metric-value" id="r-principal">—</span>
        </div>
        <div class="metric-row">
          <span class="metric-label">Simple Interest</span>
          <span class="metric-value accent" id="r-interest">—</span>
        </div>
        <div class="metric-row">
          <span class="metric-label">Total Amount</span>
          <span class="metric-value success" id="r-total">—</span>
        </div>
      </div>
    </div>
    
    <p class="hint" id="hint">Fill out details above and click calculate.</p>
  </div>

  <footer class="app-footer">
    <button class="btn-calc" onclick="calc()">Calculate</button>
  </footer>
</div>

<script>
const fmt = v => '₹' + Number(v.toFixed(2)).toLocaleString('en-IN', {minimumFractionDigits:2, maximumFractionDigits:2});

function parseDMY(str) {
  if (!str) return null;
  const parts = str.split('-');
  if (parts.length !== 3) return null;
  const day = parseInt(parts[0], 10);
  const month = parseInt(parts[1], 10) - 1;
  const year = parseInt(parts[2], 10);
  if (isNaN(day) || isNaN(month) || isNaN(year)) return null;
  const d = new Date(year, month, day);
  return (d.getDate() === day && d.getMonth() === month && d.getFullYear() === year) ? d : null;
}

function formatDMY(date) {
  const d = String(date.getDate()).padStart(2, '0');
  const m = String(date.getMonth() + 1).padStart(2, '0');
  const y = date.getFullYear();
  return `${d}-${m}-${y}`;
}

const today = new Date();
const todayStrTxt = formatDMY(today);

const startTxt = document.getElementById('startDateTxt');
const startPick = document.getElementById('startDatePicker');
const endTxt = document.getElementById('endDateTxt');
const endPick = document.getElementById('endDatePicker');
const todayTag = document.getElementById('todayTag');

// Init values
endTxt.value = todayStrTxt;
endPick.value = today.toISOString().split('T')[0];
checkTodayTag();

// Input dynamic mask logic
[startTxt, endTxt].forEach(input => {
  input.addEventListener('input', (e) => {
    let val = e.target.value.replace(/\D/g, '');
    if (val.length > 2 && val.length <= 4) {
      val = val.slice(0, 2) + '-' + val.slice(2);
    } else if (val.length > 4) {
      val = val.slice(0, 2) + '-' + val.slice(2, 4) + '-' + val.slice(4, 8);
    }
    e.target.value = val;
    
    const parsed = parseDMY(val);
    const picker = input === startTxt ? startPick : endPick;
    if (parsed) {
      picker.value = parsed.toISOString().split('T')[0];
    }
    checkTodayTag();
  });
});

// Picker listeners
[startPick, endPick].forEach(picker => {
  picker.addEventListener('input', (e) => {
    if (!e.target.value) return;
    const dateObj = new Date(e.target.value);
    const txtInput = picker === startPick ? startTxt : endTxt;
    txtInput.value = formatDMY(dateObj);
    checkTodayTag();
  });
});

function checkTodayTag() {
  todayTag.style.display = (endTxt.value === todayStrTxt) ? 'block' : 'none';
}

function monthsBetween(start, end) {
  const months = (end.getFullYear() - start.getFullYear()) * 12 + (end.getMonth() - start.getMonth());
  const days = end.getDate() - start.getDate();
  return months + (days / 30);
}

function calc() {
  const P = parseFloat(document.getElementById('principal').value);
  const r = parseFloat(document.getElementById('rate').value);
  const start = parseDMY(startTxt.value);
  const end = parseDMY(endTxt.value);

  const hint = document.getElementById('hint');
  const outputBlock = document.getElementById('outputBlock');

  if (!P || isNaN(r) || !start || !end) {
    outputBlock.style.display = 'none';
    hint.style.display = 'block';
    hint.textContent = 'Please enter valid numbers and completed dates (DD-MM-YYYY).';
    return;
  }

  if (end <= start) {
    outputBlock.style.display = 'none';
    hint.style.display = 'block';
    hint.textContent = 'End date must be after the start date.';
    return;
  }

  const n = monthsBetween(start, end);
  const SI = (P * n * r) / 100;
  const total = P + SI;

  const fullMonths = Math.floor(n);
  const partDays = Math.round((n - fullMonths) * 30);
  let durStr = fullMonths > 0 ? fullMonths + (fullMonths === 1 ? ' month' : ' months') : '';
  if (partDays > 0) durStr += (durStr ? ' ' : '') + partDays + (partDays === 1 ? ' day' : ' days');
  if (!durStr) durStr = '0 days';

  document.getElementById('durationText').textContent = `Duration: ${durStr} (n = ${n.toFixed(2)} months)`;
  document.getElementById('formulaBox').innerHTML =
    `SI = P × n × r ÷ 100 <br>= <span>${fmt(P)}</span> × <span>${n.toFixed(2)}</span> × <span>${r}</span> ÷ 100 <br>= <span>${fmt(SI)}</span>`;

  document.getElementById('r-principal').textContent = fmt(P);
  document.getElementById('r-interest').textContent = fmt(SI);
  document.getElementById('r-total').textContent = fmt(total);

  hint.style.display = 'none';
  outputBlock.style.display = 'block';
  
  // Smooth scroll down to results on mobile devices
  setTimeout(() => {
    document.querySelector('.app-content').scrollTo({
      top: document.querySelector('.app-content').scrollHeight,
      behavior: 'smooth'
    });
  }, 100);
}
</script>
